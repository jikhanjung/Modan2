name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_call:  # Allow this workflow to be called from other workflows

jobs:
  # ---------------------------------------------------------------------------
  # Lint / format — gating (runs once, not per-OS). The repo is kept ruff-clean
  # and ruff-format-clean, so these are hard checks, not advisory.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: ruff check
        run: ruff check . --output-format=github

      - name: ruff format --check
        run: ruff format --check .

  # ---------------------------------------------------------------------------
  # Tests — cross-platform matrix. Linux (3.11 + 3.12) is gating. Windows/macOS
  # (3.12) run as `experimental` (continue-on-error) so their results are
  # visible without blocking merges; flip experimental:false to make them gating
  # once they are confirmed consistently green.
  # ---------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    timeout-minutes: 40

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.11', '3.12']
        experimental: [false]
        include:
          - os: windows-latest
            python-version: '3.12'
            experimental: true
          - os: macos-latest
            python-version: '3.12'
            experimental: true

    defaults:
      run:
        shell: bash  # so the same scripts run on Windows (Git Bash) too

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xfixes0 \
            libxcb-shape0 \
            libxcb-cursor0 \
            qt5-qmake \
            qtbase5-dev \
            libqt5gui5 \
            libqt5core5a \
            libqt5widgets5 \
            libglut-dev \
            libglut3.12 \
            python3-opengl

      - name: Cache pip dependencies
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt', 'config/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r config/requirements-ci.txt

      # Provide a display for GLUT. Qt runs offscreen (no display needed), but some
      # modules call glutInit() at import time, which SEGFAULTS (uncatchable) when
      # there is no display at all — so `import Modan2` crashed the process on a
      # headless runner. Run Xvfb detached (not via xvfb-run) and just export
      # DISPLAY: because we never tear Xvfb down ourselves, the test process closes
      # its X connection on normal exit and there is no "XIO: fatal IO error"
      # teardown exit-1 (which xvfb-run's ordering caused). Linux only; on
      # Windows/macOS GLUT degrades without this.
      - name: Start virtual display (Linux)
        if: runner.os == 'Linux'
        run: |
          Xvfb :99 -screen 0 1024x768x24 >/tmp/xvfb.log 2>&1 &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"
          sleep 2

      # Fast, cross-platform guard: import every app module. Catches
      # runtime-version-only symbols and broken native extensions on the OS/
      # version that unit tests would miss. Gating on all platforms.
      # -p no:xvfb disables the pytest-xvfb plugin so it doesn't start/tear down
      # its own X server (the source of the earlier XIO exit-1); we manage the
      # display above instead.
      - name: Smoke test (imports)
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/test_smoke_import.py -p no:xvfb -v --timeout=60

      - name: Run test suite
        env:
          QT_QPA_PLATFORM: offscreen
          QT_DEBUG_PLUGINS: 0
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            pytest tests/ -p no:xvfb --cov=. --cov-report=term --cov-report=xml --tb=short --timeout=60
          else
            pytest tests/ -p no:xvfb --tb=short --timeout=60
          fi

      - name: Upload coverage (Linux)
        if: always() && runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore
