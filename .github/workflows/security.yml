name: Security

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Weekly (Mon 06:00 UTC) so newly-disclosed CVEs in already-pinned
    # dependencies surface even without a commit.
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  pip-audit:
    name: pip-audit (dependency CVEs)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      # Audit the locked dependencies at their exact pinned versions. This job
      # runs on Linux, so it audits requirements-linux.lock (the same lock the
      # Linux build installs). Fails (non-zero) if any pinned package has a known
      # vulnerability. Currently clean; if an unfixable advisory appears, add
      # `--ignore-vuln <ID>` with a comment rather than dropping the gate.
      - name: Audit locked dependencies
        run: pip-audit -r requirements-linux.lock

  lock-check:
    name: Lockfiles up to date
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      # Regenerates the locks from requirements.txt / config/requirements-dev.txt
      # and diffs against the committed files (see Makefile). A dependency edit
      # that forgets to re-lock fails here instead of silently drifting.
      - name: make lock-check
        run: make lock-check
