version: 2
updates:
  # Enable version updates for Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "@jikhanjung"
    assignees:
      - "@jikhanjung"
    commit-message:
      prefix: "deps"
      include: "scope"

  # Keep GitHub Actions (checkout, setup-python, cache, ...) current — actions
  # get security fixes and pinned major versions go stale otherwise.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
