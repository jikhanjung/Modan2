name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    uses: ./.github/workflows/test.yml

  # Same commit-count build number as build.yml / manual-release.yml so every
  # build path stamps a consistent number (github.run_number is per-workflow).
  compute-build-number:
    runs-on: ubuntu-latest
    outputs:
      build_number: ${{ steps.bn.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: bn
        run: echo "build_number=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

  call-build-workflow:
    needs: [test, compute-build-number]
    uses: ./.github/workflows/reusable_build.yml
    with:
      build_number: ${{ needs.compute-build-number.outputs.build_number }}

  create-release:
    needs: call-build-workflow
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files/

      - name: Generate SHA256 checksums
        run: |
          cd release-files
          find . -type f \( -name "*.zip" -o -name "*.dmg" -o -name "*.AppImage" \) -exec sha256sum {} \; > ../SHA256SUMS.txt
          cd ..
          echo "=== Generated Checksums ==="
          cat SHA256SUMS.txt

      # The release body is the tag's own CHANGELOG section, extracted verbatim.
      # Previously this pasted RELEASE_NOTES.md, a separate hand-maintained file
      # that drifted: it still described 0.1.5-alpha.1 long after that release.
      # Sourcing the changelog means there is one place to keep current.
      - name: Prepare release body
        id: release_body
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk -v hdr="## [$VERSION]" '
            index($0, hdr) == 1 { found=1; next }
            found && /^## \[/   { exit }
            found               { print }
          ' CHANGELOG.md | sed -e '/./,$!d' | tac | sed -e '/./,$!d' | tac)

          if [ -n "$NOTES" ]; then
            echo "Using CHANGELOG.md section for $VERSION"
            HEADER="## What's changed"
          else
            echo "::warning::No CHANGELOG.md section found for $VERSION; publishing checksums only"
            HEADER=""
          fi

          {
            echo 'RELEASE_BODY<<GH_EOF'
            echo "🚀 Modan2 ${GITHUB_REF_NAME} Release"
            echo ""
            if [ -n "$NOTES" ]; then
              echo "$HEADER"
              echo ""
              echo "$NOTES"
              echo ""
              echo "---"
              echo ""
            fi
            echo "## SHA256 Checksums"
            echo ""
            echo '```'
            cat SHA256SUMS.txt
            echo '```'
            echo ""
            echo "Built from commit: ${{ github.sha }}"
            echo 'GH_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Modan2 ${{ github.ref_name }}
          body: ${{ steps.release_body.outputs.RELEASE_BODY }}
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          files: |
            release-files/modan2-windows/*.zip
            release-files/modan2-windows/*.exe
            release-files/modan2-macos/*.dmg
            release-files/modan2-linux/*.AppImage
            SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
