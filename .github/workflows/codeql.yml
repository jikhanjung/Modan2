name: CodeQL

# Static application security testing (SAST) of Modan2's own code — data-flow
# analysis for injection, path traversal and tainted-file handling that
# pip-audit (dependency CVEs) and the ruff linters cannot see. Complements
# security.yml rather than replacing it.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Weekly (Mon 06:00 UTC), matching security.yml, so newly-shipped queries
    # re-scan an unchanged main.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      # CodeQL's Python extraction does not require the dependencies to be
      # installed; skipping the heavy PyQt5/OpenGL install keeps this fast.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: +security-extended,security-and-quality
          config: |
            paths-ignore:
              - 'tests/**'
              - '**/test_*.py'
              - 'docs/**'
              - 'devlog/**'
              - 'build/**'
              - 'dist/**'
              - 'OBJFileLoader/**'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
