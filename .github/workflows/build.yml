name: Build

permissions:
  contents: write

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # Single source of truth for the build number, shared with manual-release.yml.
  # github.run_number is per-workflow, so it can't stay consistent across the two;
  # the commit count is workflow-independent and monotonic. Needs full history.
  compute-build-number:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    outputs:
      build_number: ${{ steps.bn.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: bn
        run: echo "build_number=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

  call-build-workflow:
    needs: compute-build-number
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    uses: ./.github/workflows/reusable_build.yml
    with:
      build_number: ${{ needs.compute-build-number.outputs.build_number }}
