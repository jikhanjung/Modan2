[pytest]
# pytest configuration file

# Force pytest-qt to use PyQt5
qt_api = pyqt5

# Test discovery patterns
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Coverage options (when running with --cov)
# Run: pytest --cov=. --cov-report=html
# Exclude test files and setup files from coverage

# Markers for categorizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may use database)
    workflow: Integration workflow tests (multi-component)
    dialog: Dialog UI tests (require Qt)
    slow: Slow tests (performance and stress tests)
    performance: Performance benchmarking tests
    gui: GUI tests (require Qt)
    timeout: Tests with custom timeout settings

# Ignore warnings from dependencies
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    # Fail on a missing-glyph render: this is the "Korean text renders as tofu"
    # regression class (devlog 241). No test triggers it today, so it is a pure
    # guard — any future test that renders text with a font missing the glyph
    # (e.g. a CJK label with a Latin-only font) fails instead of silently drawing
    # boxes. Broad DeprecationWarning-as-error is intentionally NOT enabled: most
    # are third-party and would just be noise.
    error:Glyph.*missing from font
