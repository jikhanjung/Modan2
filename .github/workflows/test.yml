name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_call:  # Allow this workflow to be called from other workflows

jobs:
  # ---------------------------------------------------------------------------
  # Lint / format — gating (runs once, not per-OS). The repo is kept ruff-clean
  # and ruff-format-clean, so these are hard checks, not advisory.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      # Pin the linter: an unpinned `pip install ruff` picks up whatever released
      # last, and a newer ruff started formatting Python blocks inside Markdown,
      # turning a green tree into "103 files would be reformatted". Keep this in
      # sync with the rev in .pre-commit-config.yaml so CI, pre-commit and local
      # runs all agree.
      - name: Install ruff
        run: pip install ruff==0.15.22

      - name: ruff check
        run: ruff check . --output-format=github

      - name: ruff format --check
        run: ruff format --check .

      # Pinned for the same reason as ruff: a new mypy release adding checks
      # should be an intentional upgrade, not a surprise red build.
      - name: Install mypy
        run: pip install mypy==2.3.0

      # Type checking is incremental: gate only the modules already at zero mypy
      # errors. Expand this list as more modules are cleaned (config in
      # pyproject.toml [tool.mypy]).
      - name: mypy (typed modules)
        run: >
          mypy components dialogs
          MdConstants.py MdStatistics.py MdHelpers.py MdUtils.py MdModel.py
          MdAppSetup.py MdSplashScreen.py ModanController.py ModanComponents.py
          Modan2.py main.py version.py

      # Complexity REPORT (never fails the build): lists functions above a
      # cyclomatic-complexity of 15 in the log as a refactoring watch-list. Not
      # a gate — mccabe on a GUI codebase has legitimate long paintEvent/
      # draw handlers; this is signal, not a blocker.
      - name: Complexity report (C901, non-gating)
        run: ruff check . --select C901 --config "lint.mccabe.max-complexity=15" --exit-zero

  # ---------------------------------------------------------------------------
  # Tests — cross-platform matrix. All legs are gating: Linux / Windows / macOS
  # on Python 3.12. 3.11 was dropped 2026-07-24 (devlog 248): numpy 2.5.1+
  # requires 3.12, and the app targets 3.12 anyway.
  # ---------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    timeout-minutes: 40

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.12']
        experimental: [false]
        include:
          - os: windows-latest
            python-version: '3.12'
            experimental: false
          - os: macos-latest
            python-version: '3.12'
            experimental: false

    defaults:
      run:
        shell: bash  # so the same scripts run on Windows (Git Bash) too

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            fonts-nanum \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xfixes0 \
            libxcb-shape0 \
            libxcb-cursor0 \
            qt5-qmake \
            qtbase5-dev \
            libqt5gui5 \
            libqt5core5a \
            libqt5widgets5 \
            libglut-dev \
            libglut3.12 \
            python3-opengl

      - name: Cache pip dependencies
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-*.lock') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Install from the hash-verified, per-platform lockfile so every matrix leg
      # and the release build resolve the exact same wheels. The locks are
      # per-OS because PyQt5's Qt binary pins differ by platform (see Makefile);
      # each is compiled from requirements.txt + config/requirements-dev.txt and
      # gated against drift by the lock-check job in security.yml.
      - name: Install Python dependencies
        run: |
          case "$RUNNER_OS" in
            Linux)   LOCK=requirements-linux.lock ;;
            Windows) LOCK=requirements-windows.lock ;;
            macOS)   LOCK=requirements-macos.lock ;;
            *) echo "Unknown RUNNER_OS: $RUNNER_OS"; exit 1 ;;
          esac
          echo "Installing from $LOCK"
          python -m pip install --upgrade pip
          pip install --require-hashes -r "$LOCK"

      # Provide a display for GLUT. Qt runs offscreen (no display needed), but some
      # modules call glutInit() at import time, which SEGFAULTS (uncatchable) when
      # there is no display at all — so `import Modan2` crashed the process on a
      # headless runner. Run Xvfb detached (not via xvfb-run) and just export
      # DISPLAY: because we never tear Xvfb down ourselves, the test process closes
      # its X connection on normal exit and there is no "XIO: fatal IO error"
      # teardown exit-1 (which xvfb-run's ordering caused). Linux only; on
      # Windows/macOS GLUT degrades without this.
      - name: Start virtual display (Linux)
        if: runner.os == 'Linux'
        run: |
          Xvfb :99 -screen 0 1024x768x24 >/tmp/xvfb.log 2>&1 &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"
          sleep 2

      # Fast, cross-platform guard: import every app module. Catches
      # runtime-version-only symbols and broken native extensions on the OS/
      # version that unit tests would miss. Gating on all platforms.
      # -p no:xvfb disables the pytest-xvfb plugin so it doesn't start/tear down
      # its own X server (the source of the earlier XIO exit-1); we manage the
      # display above instead.
      - name: Smoke test (imports)
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/test_smoke_import.py -p no:xvfb -v --timeout=60

      - name: Run test suite
        env:
          QT_QPA_PLATFORM: offscreen
          QT_DEBUG_PLUGINS: 0
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            # --cov-fail-under is a ratchet floor (current overall ~64%); raise it
            # over time. Coverage is measured on Linux only.
            pytest tests/ -p no:xvfb --cov=. --cov-report=term --cov-report=xml \
              --cov-fail-under=60 --tb=short --timeout=60
          else
            pytest tests/ -p no:xvfb --tb=short --timeout=60
          fi

      - name: Upload coverage (Linux)
        if: always() && runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore
