name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag (e.g., v0.1.4-beta.5)'
        required: true
        type: string
      prerelease:
        description: 'Is this a pre-release?'
        required: true
        type: boolean
        default: true
      release_notes:
        description: 'Release notes (optional)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  # Same commit-count build number as build.yml, so manually-released builds
  # carry a number consistent with CI/CD builds (github.run_number is per-workflow
  # and would otherwise diverge). Needs full history.
  compute-build-number:
    runs-on: ubuntu-latest
    outputs:
      build_number: ${{ steps.bn.outputs.build_number }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: bn
        run: echo "build_number=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

  call-build-workflow:
    needs: compute-build-number
    uses: ./.github/workflows/reusable_build.yml
    with:
      build_number: ${{ needs.compute-build-number.outputs.build_number }}

  create-release:
    needs: [compute-build-number, call-build-workflow]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.version_tag }}-build.${{ needs.compute-build-number.outputs.build_number }}
          name: Modan2 ${{ github.event.inputs.version_tag }} (Build ${{ needs.compute-build-number.outputs.build_number }})
          body: |
            🚀 Modan2 ${{ github.event.inputs.version_tag }} Release

            Built from commit: ${{ github.sha }}
            Build number: ${{ needs.compute-build-number.outputs.build_number }}

            ${{ github.event.inputs.release_notes }}
          prerelease: ${{ github.event.inputs.prerelease }}
          files: |
            release-files/modan2-windows/Modan2-Windows-*.zip
            release-files/modan2-macos/Modan2-macOS-*.dmg
            release-files/modan2-linux/Modan2-Linux-*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
