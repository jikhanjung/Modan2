[tool.ruff]
# Target Python 3.12
target-version = "py312"

# Line length
line-length = 120

# Exclude directories
exclude = [
    ".git",
    "__pycache__",
    "venv",
    ".venv",
    "htmlcov",
    ".pytest_cache",
    "build",
    "dist",
    "*.egg-info",
    ".index",
    "docs/_build",
    "OBJFileLoader",  # Third-party code
    "migrations",     # Auto-generated migration files
]

[tool.ruff.lint]
# Enable rules
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort (import sorting)
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "LOG",    # flake8-logging (logging misuse) — 0 app-code violations; guards new code
    "RUF012", # mutable class-attr default (shared-state-across-instances bug); app code is clean
    "S",      # flake8-bandit (security) — file-ingesting desktop app; guards new code
              # for eval/exec/pickle/unsafe-yaml/hardcoded-SQL etc. The noisy subset
              # (S101 asserts, S110/S112 defensive suppression, S311 non-crypto random)
              # is ignored below after a full triage (devlog 245); md5 fixed with
              # usedforsecurity=False; dev/build-tool subprocess is per-file-ignored.
    # Phased adoption of further groups is planned in devlog R05 (measured
    # violation counts + handling per group). Add them here as each phase lands.
]

# Ignore specific rules
ignore = [
    "E501",  # line too long (handled by formatter)
    "E402",  # module level import not at top of file (some imports need to be after sys.path manipulation)
    "N802",  # function name should be lowercase (Qt methods use camelCase)
    "N803",  # argument name should be lowercase (Qt arguments use camelCase)
    "N806",  # variable in function should be lowercase (Qt variables use camelCase)
    "N812",  # lowercase imported as non-lowercase (APP_VERSION is intentional)
    "B905",  # zip without explicit strict parameter (not available in Python 3.9)
    # flake8-bandit noise, triaged in devlog 245 (all 13 S110/S112 sites are
    # intentional best-effort suppression: error-handler cleanup, optional-feature
    # fallbacks, startup guards that must never re-raise):
    "S110",  # try-except-pass — intentional defensive suppression across the GUI
    "S112",  # try-except-continue — same, in per-item loops
    "S311",  # non-crypto random — only used for viewer color-picking/visuals; the
             # app has no cryptographic use of randomness
]

[tool.ruff.format]
# Formatting options
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.ruff.lint.isort]
# Import sorting
known-first-party = ["MdModel", "MdUtils", "MdStatistics", "MdHelpers", "MdConstants", "ModanController", "ModanComponents", "ModanWidgets"]
known-third-party = ["PyQt5", "peewee", "numpy", "pandas", "scipy", "matplotlib", "cv2", "PIL"]

[tool.ruff.lint.per-file-ignores]
# Ignore specific rules for specific files
"__init__.py" = ["F401"]  # Unused imports in __init__.py are often intentional
"tests/*" = ["N802", "N803", "E712", "E722", "B017"]  # Allow non-lowercase function names, comparison to True/False, bare except, and generic exceptions in tests
"tests/**" = ["S"]  # bandit doesn't apply to trusted test code: asserts (S101), /tmp fixtures (S108), test SQL/subprocess/md5 fixtures
"dialogs/*" = ["N813"]  # Allow "import MdUtils as mu" convention in dialogs
"components/*" = ["N811", "N813", "B007", "B008", "E741", "N815", "F811", "F821"]  # Allow OpenGL/GLUT lowercase imports, MdUtils as mu, loop control variables, Qt naming conventions, ambiguous variables, duplicate functions, and undefined names
"build.py" = ["E402", "N813", "S603"]  # Allow imports after code, lowercase module imports; subprocess runs trusted build commands
"manage_version.py" = ["S603", "S607"]  # Dev tool: subprocess runs trusted git/python with partial paths
"docs/build_all.py" = ["S602", "S603", "S607"]  # Dev docs-build script: trusted shell/subprocess commands
"tools/*" = ["S603", "S607"]  # Dev index tooling: subprocess runs trusted commands with partial paths
"migrate.py" = ["E402", "N813", "N816"]  # Allow imports after code and naming conventions
"MdHelpers.py" = ["F401"]  # Imports in try-except blocks for dependency checking
"MdModel.py" = ["N813", "N816"]  # Allow "import MdUtils as mu" and gDatabase global
"MdSplashScreen.py" = ["N813"]  # Allow "import MdUtils as mu" convention
"Modan2.py" = ["N813", "F821", "F811"]  # Allow "import MdUtils as mu", undefined language variable, and duplicate functions
"ModanController.py" = ["N813"]  # Allow "import MdUtils as mu"
"ModanComponents.py" = ["N811", "N813", "B007", "B008", "B018", "E741", "N815", "F811", "F821"]  # Allow OpenGL lowercase imports, loop control, Qt naming conventions, duplicate functions, and undefined names
"setup.py" = ["B904"]  # Allow raise without from
"test_*.py" = ["N813", "F811"]  # Allow lowercase imports and class redefinitions in tests
"ModanWidgets.py" = ["N813"]  # Allow "import ModanWidgets as mw"
"objloader.py" = ["F403", "F405"]  # OpenGL star imports are standard practice

[tool.mypy]
python_version = "3.12"
# Third-party stubs are spotty for the scientific/Qt stack; don't fail on them.
ignore_missing_imports = true
# Per-module incremental adoption: check each gated module on its OWN errors,
# using imports only for type info (don't report errors in imported modules).
# Without this, `mypy MdUtils.py` reports the whole import graph's errors (e.g.
# the repo-wide matplotlib FigureCanvas / OpenGL glut stub patterns), so no
# module could be gated until the entire tree was clean.
follow_imports = "silent"
# The modules passed to mypy in CI (see .github/workflows/test.yml `mypy ...`)
# are gated — now the core root modules plus all of components/ and dialogs/.
# tests/ and build scripts remain ungated.
